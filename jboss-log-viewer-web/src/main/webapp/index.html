<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBoss Log Viewer</title>
    <link rel="icon" href="./icons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="topbar">
        <h1 class="title">JBoss Log Viewer</h1>

        <div class="controls">
            <div class="logset-toggle" role="group" aria-label="Log set">
                <button type="button" id="set-server" class="toggle-btn">Server</button>
                <button type="button" id="set-application" class="toggle-btn active">Application</button>
            </div>

            <label class="refresh-label">
                <input type="checkbox" id="auto-refresh"> Auto-refresh
            </label>
            <select id="refresh-interval" title="Refresh interval">
                <option value="5000" selected>5 s</option>
                <option value="10000">10 s</option>
                <option value="30000">30 s</option>
                <option value="60000">1 min</option>
                <option value="300000">5 min</option>
                <option value="900000">15 min</option>
                <option value="1800000">30 min</option>
            </select>

            <button type="button" id="refresh-btn" title="Refresh now">Refresh</button>
            <button type="button" id="download-btn" title="Download" disabled>Download</button>

            <span class="file-info" id="file-info"></span>
        </div>
    </header>

    <main class="layout" id="layout">
        <aside class="tree-pane" id="tree-pane">
            <div class="tree" id="tree" aria-label="Log file tree"></div>
        </aside>

        <div class="divider" id="divider" role="separator" aria-orientation="vertical"
             tabindex="0" title="Drag to resize"></div>

        <section class="content-pane">
            <div class="entry-picker" id="entry-picker" hidden>
                <label for="entry-select">Archive entry:</label>
                <select id="entry-select"></select>
            </div>
            <pre class="content" id="content" tabindex="0"></pre>
        </section>
    </main>

    <script src="./js/app.js"></script>
    <footer id="footer-path" class="footer"></footer>
</body>
</html>
