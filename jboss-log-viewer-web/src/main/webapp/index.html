<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JBoss Log Viewer</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="topbar">
        <h1 class="title">JBoss Log Viewer</h1>

        <div class="controls">
            <div class="logset-toggle" role="group" aria-label="Log set">
                <button type="button" id="set-server" class="toggle-btn active">Server</button>
                <button type="button" id="set-application" class="toggle-btn">Application</button>
            </div>

            <label class="refresh-label">
                <input type="checkbox" id="auto-refresh"> Auto-refresh (5s)
            </label>

            <button type="button" id="refresh-btn" title="Refresh now">Refresh</button>

            <span class="file-info" id="file-info"></span>
        </div>
    </header>

    <main class="layout" id="layout">
        <aside class="tree-pane" id="tree-pane">
            <div class="tree" id="tree" aria-label="Log file tree"></div>
        </aside>

        <div class="divider" id="divider" role="separator" aria-orientation="vertical"
             tabindex="0" title="Drag to resize"></div>

        <section class="content-pane">
            <div class="entry-picker" id="entry-picker" hidden>
                <label for="entry-select">Archive entry:</label>
                <select id="entry-select"></select>
            </div>
            <pre class="content" id="content" tabindex="0"></pre>
        </section>
    </main>

    <script src="./js/app.js"></script>
</body>
</html>
